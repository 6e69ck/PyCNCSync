name: Build PyCNCSync

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        run: pyinstaller app.spec
      
      - name: Create DMG
        run: |
          hdiutil create -volname "PyCNCSync" -srcfolder dist -ov -format UDZO dist/PyCNCSync.dmg

      - name: Verify DMG output
        run: |
          ls -la dist
          test -f dist/PyCNCSync.dmg
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: PyCNCSync-macos-installer
          path: dist/*.dmg
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        run: pyinstaller app.spec
      
      - name: Install NSIS
        run: choco install nsis -y
      
      - name: Build Windows Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
      
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: PyCNCSync-windows-installer
          path: dist/PyCNCSync-Installer.exe
