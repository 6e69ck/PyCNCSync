name: Build PyCNCSync

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        run: pyinstaller app.spec
      
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg --volname "PyCNCSync" --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon "PyCNCSync.app" 200 190 --hide-extension "PyCNCSync.app" --app-drop-link 600 190 "dist/PyCNCSync.dmg" "dist/" || true
      
      - name: Upload macOS DMG
        uses: actions/upload-artifact@v4
        with:
          name: PyCNCSync-macos-installer
          path: dist/PyCNCSync.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Build with PyInstaller
        run: pyinstaller app.spec
      
      - name: Install NSIS
        run: choco install nsis -y
      
      - name: Build Windows Installer
        run: |
          & "C:\Program Files (x86)\NSIS\makensis.exe" installer.nsi
      
      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: PyCNCSync-windows-installer
          path: dist/PyCNCSync-Installer.exe
